services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: ${CONTAINER_NAME:-vllm-server}
    ports:
      - "${VLLM_PORT:-8000}:${VLLM_PORT:-8000}"
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_ENABLE_CUDA_COMPATIBILITY=${VLLM_ENABLE_CUDA_COMPATIBILITY:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    networks:
      - sophon-net
    command: >
      --model ${VLLM_MODEL:-google/gemma-4-E2B-it}
      --host 0.0.0.0
      --port ${VLLM_PORT:-8000}
      --api-key ${VLLM_API_KEY:-}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8192}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      --tensor-parallel-size ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      --trust-remote-code
      ${EXTRA_VLLM_ARGS:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${VLLM_PORT:-8000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

networks:
  sophon-net:
    name: sophon-net
    driver: bridge
