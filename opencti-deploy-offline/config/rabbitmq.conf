## ────────────────────────────────────────────────────────────
## RabbitMQ config — mount vào /etc/rabbitmq/rabbitmq.conf
## Biến khớp với start.sh: RABBITMQ__PORT, RABBITMQ__PORT_MANAGEMENT
## ────────────────────────────────────────────────────────────

## ── Network ─────────────────────────────────────────────────
listeners.tcp.default = 5672
management.tcp.port   = 15672

## ── Message limits ──────────────────────────────────────────
max_message_size = 536870912
consumer_timeout = 86400000

## ── Logging ─────────────────────────────────────────────────
log.dir  = /var/log/rabbitmq
log.file = rabbit.log
log.file.level = info

## ── Default user (dùng cho management UI, tương thích start.sh) ─
## User + permissions tạo bởi setup_infra.sh (rabbitmqctl add_user)
## default_user / default_pass chỉ dùng nếu chưa có mnesia data
default_user  = opencti
default_pass  = Vipstmt@828682
default_vhost = /