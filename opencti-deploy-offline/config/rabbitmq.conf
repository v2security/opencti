# RabbitMQ Configuration — OpenCTI Offline Deployment
# Credentials khớp với config/start.sh: RABBITMQ__USERNAME, RABBITMQ__PASSWORD
#
# Deploy to: /etc/rabbitmq/rabbitmq.conf

# Listeners
listeners.tcp.default = 5672

# Management plugin
management.tcp.port = 15672

# Default user (created on first start)
# Khớp với start.sh: RABBITMQ__USERNAME / RABBITMQ__PASSWORD
default_user = opencti
default_pass = Vipstmt@828682
default_user_tags.administrator = true
default_permissions.configure = .*
default_permissions.read = .*
default_permissions.write = .*

# OpenCTI tuning (from 90-opencti.conf)
max_message_size = 536870912
consumer_timeout = 86400000

# Logging
log.file.level = info
log.console = false
log.console.level = info
