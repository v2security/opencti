# ── Elasticsearch 8.x — OpenCTI single-node config ──────────
# Mount vào: /usr/share/elasticsearch/config/elasticsearch.yml
#
# Biến khớp với start.sh:
#   ELASTICSEARCH__URL = http://elasticsearch:8686
#   ELASTICSEARCH__NUMBER_OF_REPLICAS = 0

cluster.name: opencti-cluster
node.name: node-1
discovery.type: single-node

network.host: 0.0.0.0
http.port: 8686

# Security disabled (internal use, offline deployment)
xpack.security.enabled: false
xpack.security.enrollment.enabled: false
xpack.security.http.ssl.enabled: false
xpack.security.transport.ssl.enabled: false

# Performance tuning for OpenCTI
indices.query.bool.max_clause_count: 4096
