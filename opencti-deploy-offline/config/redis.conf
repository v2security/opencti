# Redis Configuration — OpenCTI Offline Deployment
# Deploy to: /etc/redis/redis.conf
# Setup by: redis/v2_setup_redis.sh

bind 0.0.0.0
port 6379
dir /var/lib/redis
daemonize no
loglevel notice
logfile /var/log/redis/redis.log

# ─── Persistence: TẮT RDB ───
# Redis 6.2.x có bug raxNext segfault (signal 11) khi BGSAVE fork.
# OpenCTI dùng Redis làm cache/stream, KHÔNG cần durability.
# → Tắt RDB hoàn toàn để tránh persistence crash hệ thống.
save ""
stop-writes-on-bgsave-error no

# ─── Memory ───
maxmemory 8gb
maxmemory-policy allkeys-lru

# ─── Performance ───
hz 25
dynamic-hz yes
jemalloc-bg-thread yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ─── Authentication ───
requirepass Vipstmt@828682
