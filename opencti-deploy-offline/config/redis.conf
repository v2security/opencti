# Redis Configuration — OpenCTI Offline Deployment
# Credentials khớp với config/start.sh: REDIS__PASSWORD
#
# Deploy to: /etc/redis/redis.conf

bind 0.0.0.0
port 6379
dir /var/lib/redis
daemonize no
loglevel notice
logfile /var/log/redis/redis.log

# Persistence
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb

# Authentication (from start.sh REDIS__PASSWORD)
requirepass Vipstmt@828682
