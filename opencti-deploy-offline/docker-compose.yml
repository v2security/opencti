###############################################################################
# Docker Compose — Test Infrastructure trên Rocky Linux 9
#
# Mount:
#   ./files/   → /root/opencti-deploy/files      (MinIO binary, Redis source, RabbitMQ tarball)
#   ./rpm/     → /root/opencti-deploy/rpm         (Erlang RPM, system deps)
#   ./scripts/ → /root/opencti-deploy/infra/scripts   (run_minio.sh, run_redis.sh, run_rabbitmq.sh)
#   ./systemd/ → /root/opencti-deploy/infra/systemd   (*.service files)
#   ./scripts/setup_infra.sh → /root/opencti-deploy/infra/setup_infra.sh
#   ./config/redis.conf        → /etc/redis/redis.conf
#   ./config/minio.conf        → /etc/minio/minio.conf
#   ./config/rabbitmq.conf     → /etc/rabbitmq/rabbitmq.conf
#   ./config/rabbitmq-env.conf → /etc/rabbitmq/rabbitmq-env.conf
#   ./config/enabled_plugins   → /opt/rabbitmq/etc/rabbitmq/enabled_plugins
#
# Usage:
#   cd opencti-deploy-offline
#   docker compose up -d                          # Start Rocky 9 container
#   docker exec opencti-infra-test bash /root/opencti-deploy/infra/setup_infra.sh
#   docker exec opencti-infra-test systemctl status redis minio rabbitmq-server
#
# Hoặc dùng Makefile:
#   make build up deploy status
###############################################################################

services:
  rocky9-infra:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencti-infra-test
    hostname: infra-test
    privileged: true
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      # ── Source files (read-only) ────────────────────────────
      - ./files:/root/opencti-deploy/files:ro
      - ./rpm:/root/opencti-deploy/rpm:ro
      # ── Infra scripts + systemd (read-only) ────────────────
      - ./scripts:/root/opencti-deploy/infra/scripts:ro
      - ./systemd:/root/opencti-deploy/infra/systemd:ro
      - ./scripts/setup_infra.sh:/root/opencti-deploy/infra/setup_infra.sh:ro
      # ── Config (start.sh chứa biến env) ─────────────────
      - ./config:/root/opencti-deploy/config:ro
      # ── Service configs (mount trực tiếp vào đúng path) ────
      - ./config/redis.conf:/etc/redis/redis.conf:ro
      - ./config/minio.conf:/etc/minio/minio.conf:ro
      - ./config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./config/rabbitmq-env.conf:/etc/rabbitmq/rabbitmq-env.conf:ro
      - ./config/enabled_plugins:/opt/rabbitmq/etc/rabbitmq/enabled_plugins:ro
    ports:
      - "16379:6379"      # Redis
      - "19000:9000"      # MinIO API
      - "19001:9001"      # MinIO Console
      - "15672:5672"      # RabbitMQ AMQP
      - "25672:15672"     # RabbitMQ Management
    environment:
      - container=docker
    mem_limit: 4g
    stop_grace_period: 15s
    restart: unless-stopped
