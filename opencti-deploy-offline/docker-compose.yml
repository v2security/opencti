###############################################################################
# Docker Compose — Test OpenCTI Offline Deployment trên Rocky Linux 9
#
# Services:
#   1. rocky9-test    — Rocky 9 container giả lập bare-metal (systemd)
#   2. elasticsearch  — Elasticsearch 8.x container
#
# Nguyên tắc: Mount trực tiếp vào đúng path — giống ISO cài bare-metal.
# Container khởi động = mọi thứ đúng chỗ, sẵn sàng chạy setup scripts.
#
# Mount layout:
#   Binaries + scripts (runtime)  → /usr/local/bin/
#   Tarballs + setup scripts      → /tmp/<component>/
#   Config (tập trung config/)    → /etc/<service>/
#   Systemd units (systemd/)      → /etc/systemd/system/
#
# Test flow:
#   docker compose up -d
#   docker exec -it opencti-test bash
#
#   # 1. Install RPMs
#   cd /tmp/rpms && ./v2_install_rpms.sh
#
#   # 2. Install runtime
#   cd /tmp/runtime && ./v2_install_python.sh && ./v2_install_nodejs.sh
#
#   # 3. Setup infra
#   v2_setup_minio.sh
#   cd /tmp/rabbitmq && ./v2_setup_rabbitmq.sh
#
#   # 4. Start services
#   systemctl enable redis minio rabbitmq
#   systemctl start redis minio rabbitmq
#   systemctl status redis minio rabbitmq
###############################################################################

services:
  # ══════════════════════════════════════════════════════════════
  # Rocky Linux 9 — giả lập bare-metal target server (no internet)
  # ══════════════════════════════════════════════════════════════
  rocky9-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencti-test
    hostname: opencti-test
    privileged: true
    cgroup: host
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

      # ══════════════════════════════════════════════════════════
      # RPMs — packages + install script → /tmp/rpms/
      # ══════════════════════════════════════════════════════════
      - ./rpms:/tmp/rpms:ro

      # ══════════════════════════════════════════════════════════
      # Runtime — Python 3.12, Node.js 22
      # Tarballs + install scripts → /tmp/runtime/
      # Uninstall scripts → /usr/local/bin/
      # ══════════════════════════════════════════════════════════
      - ./runtime/python312.tar.gz:/tmp/runtime/python312.tar.gz:ro
      - ./runtime/nodejs22.tar.gz:/tmp/runtime/nodejs22.tar.gz:ro
      - ./runtime/v2_install_python.sh:/tmp/runtime/v2_install_python.sh:ro
      - ./runtime/v2_install_nodejs.sh:/tmp/runtime/v2_install_nodejs.sh:ro
      - ./runtime/v2_uninstall_python.sh:/usr/local/bin/v2_uninstall_python.sh:ro
      - ./runtime/v2_uninstall_nodejs.sh:/usr/local/bin/v2_uninstall_nodejs.sh:ro

      # ══════════════════════════════════════════════════════════
      # MinIO — binaries + scripts → /usr/local/bin/
      # (v2_setup_minio.sh tìm binary trong /usr/local/bin/)
      # ══════════════════════════════════════════════════════════
      - ./minio/minio:/usr/local/bin/minio:ro
      - ./minio/mc:/usr/local/bin/mc:ro
      - ./minio/v2_setup_minio.sh:/usr/local/bin/v2_setup_minio.sh:ro
      - ./minio/v2_start_minio.sh:/usr/local/bin/v2_start_minio.sh:ro
      - ./minio/v2_stop_minio.sh:/usr/local/bin/v2_stop_minio.sh:ro
      - ./minio/v2_uninstall_minio.sh:/usr/local/bin/v2_uninstall_minio.sh:ro

      # ══════════════════════════════════════════════════════════
      # RabbitMQ — tarball + setup → /tmp/rabbitmq/
      # Start/stop/uninstall → /usr/local/bin/
      # ══════════════════════════════════════════════════════════
      - ./rabbitmq/rabbitmq-server-generic-unix-4.2.0.tar.xz:/tmp/rabbitmq/rabbitmq-server-generic-unix-4.2.0.tar.xz:ro
      - ./rabbitmq/v2_setup_rabbitmq.sh:/tmp/rabbitmq/v2_setup_rabbitmq.sh:ro
      - ./rabbitmq/v2_start_rabbitmq.sh:/usr/local/bin/v2_start_rabbitmq.sh:ro
      - ./rabbitmq/v2_stop_rabbitmq.sh:/usr/local/bin/v2_stop_rabbitmq.sh:ro
      - ./rabbitmq/v2_uninstall_rabbitmq.sh:/usr/local/bin/v2_uninstall_rabbitmq.sh:ro

      # ══════════════════════════════════════════════════════════
      # Configs (tập trung config/) → mount vào đúng path service
      # ══════════════════════════════════════════════════════════
      - ./config/redis.conf:/etc/redis/redis.conf:ro
      - ./config/minio.conf:/etc/minio/minio.conf:ro
      - ./config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./config/rabbitmq-env.conf:/etc/rabbitmq/rabbitmq-env.conf:ro
      - ./config/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./config/logrotate.conf:/etc/logrotate.d/opencti:ro

      # ══════════════════════════════════════════════════════════
      # Systemd service units
      # ══════════════════════════════════════════════════════════
      - ./systemd/minio.service:/etc/systemd/system/minio.service:ro
      - ./systemd/rabbitmq.service:/etc/systemd/system/rabbitmq.service:ro

    ports:
      - "16379:6379"      # Redis
      - "19000:9000"      # MinIO API
      - "19001:9001"      # MinIO Console
      - "15672:5672"      # RabbitMQ AMQP
      - "25672:15672"     # RabbitMQ Management
    environment:
      - container=docker
    mem_limit: 8g
    stop_grace_period: 30s
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # Elasticsearch 8.x — container riêng (giả lập ES đã cài sẵn)
  # Config mount từ config/elasticsearch.yml (port 8686, no auth)
  # ══════════════════════════════════════════════════════════════
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    container_name: opencti-elasticsearch
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - ./config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "18686:8686"
    mem_limit: 4g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8686/_cluster/health | grep -qE '(green|yellow)'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  es-data:
    driver: local
