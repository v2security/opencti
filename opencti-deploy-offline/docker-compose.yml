###############################################################################
# Docker Compose — Test offline deployment trên Rocky Linux 9
#
# Container giả lập máy đích bare-metal Rocky 9 (KHÔNG có Docker).
# Sau khi up, chạy deploy-offline.sh để cài toàn bộ từ offline package.
#
# Mount paths:
#   ./output  →  /root/opencti-deploy    (package files — giống máy đích sau tar -xzf)
#
# Máy triển khai thật: Rocky 9, systemd, RPM, tarball — KHÔNG Docker.
# File này chỉ dùng để TEST trước khi deploy thật.
#
# Usage:
#   make test             # Full: build + deploy + status
#   make build && make up # Start container
#   make deploy           # Chạy deploy-offline.sh
#   make status           # Kiểm tra services
#   make exec             # Shell vào container
#   make destroy          # Xóa tất cả
###############################################################################

services:
  rocky9:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencti-rocky9-test
    hostname: opencti-test
    privileged: true                     # Cần cho systemd + sysctl
    cgroup: host                         # cgroup v2 — cần cho systemd trong container
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      # Mount output/ → /root/opencti-deploy
      # Giống hệt máy đích: tar -xzf opencti-offline-deploy.tar.gz → opencti-deploy/
      - ./output:/root/opencti-deploy:rw
      # Persist data giữa các lần test (không cần re-deploy)
      - opt-data:/opt                    # ES, RabbitMQ, MinIO, OpenCTI, Python, Worker
      - var-data:/var                    # Redis data, RabbitMQ mnesia, MinIO data
    ports:
      - "8443:8443"                      # OpenCTI HTTPS
      - "9200:9200"                      # Elasticsearch
      - "15672:15672"                    # RabbitMQ Management
      - "9001:9001"                      # MinIO Console
    environment:
      - container=docker
    mem_limit: 12g
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  opt-data:
  var-data:
