# NVD CVE Connector — non-sensitive settings only.
# Secrets (OPENCTI_TOKEN, CONNECTOR_ID, NVD_API_KEY) come from .env or env vars.

opencti:
  url: "http://localhost:8080"

connector:
  type: "EXTERNAL_IMPORT"
  name: "NVD CVE (V2Secure)"
  scope: "vulnerability"
  log_level: "info"
  duration_period: "P1D"
  relationship_delay: 600

nvd:
  base_url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
  request_timeout: 30
  max_date_range: 7
  maintain_data: true
  pull_history: true
  history_start_year: 2002

epss:
  enabled: true
  api_url: "https://api.first.org/data/v1/epss"
  request_timeout: 30
  request_delay: 0.1
  batch_size: 30
