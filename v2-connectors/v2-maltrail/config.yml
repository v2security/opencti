# Maltrail IOC Connector — non-sensitive settings only.
# Secrets (OPENCTI_TOKEN, CONNECTOR_ID) come from .env or env vars.

opencti:
  url: "http://localhost:8080"

connector:
  type: "EXTERNAL_IMPORT"
  name: "Maltrail IOC"
  scope: "indicator"
  log_level: "info"
  duration_period: "P1D"
  relationship_delay: 600

maltrail:
  repo_url: "https://github.com/stamparm/maltrail.git"
  data_dir: "tools/.data"
  bundle_size: 500
  valid_days: 30
  root_file_label: "suspicious"         # Category for root-level .txt files (mass_scanner.txt etc.)
