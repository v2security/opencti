# V2Secure Honeypot Connector — non-sensitive settings only.
# Secrets (OPENCTI_TOKEN, CONNECTOR_ID) come from .env or env vars.

opencti:
  url: "http://localhost:8080"

connector:
  type: "EXTERNAL_IMPORT"
  name: "Honeypot (V2Secure)"
  scope: "indicator"
  log_level: "info"
  duration_period: "PT30M"
  relationship_delay: 300

honeypot:
  file_path: "/opt/connector/data/honeypot/IP_Reputation.csv"
  bundle_size: 500
  valid_days: 90
