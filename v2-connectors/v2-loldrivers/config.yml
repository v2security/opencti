# LOLDrivers Connector — non-sensitive settings only.
# Secrets (OPENCTI_TOKEN, CONNECTOR_ID) come from .env or env vars.

opencti:
  url: "http://localhost:8080"

connector:
  type: "EXTERNAL_IMPORT"
  name: "LOLDrivers (V2Secure)"
  scope: "loldrivers"
  log_level: "info"
  duration_period: "P1D"
  relationship_delay: 300

loldrivers:
  api_url: "https://www.loldrivers.io/api/drivers.json"
  request_timeout: 60
  import_malicious: true
  import_vulnerable: true
  bundle_size: 50
  create_indicators: true
  create_observables: true
